<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:; connect-src *;">
    <title>Copilot Widget Embed Test</title>
    <style>
        body {
            font-family: serif; /* Should NOT affect the widget */
            background-color: #f0f0f0;
            padding: 50px;
            color: red; /* Should NOT affect the widget text color */
        }
        h1 {
            color: blue;
        }
        /* Host site attempts to break card styles */
        .card { 
            border: 10px solid purple !important;
            background: yellow !important;
        }
    </style>
</head>
<body>
    <h1>Host Website (Simulation)</h1>
    <p>This is a plain HTML page simulating a merchant's website.</p>
    <div class="card">If the widget is also a .card, this purple border should NOT appear on it.</div>

    <!-- Widget Configuration -->
    <script>
        window.CopilotWidgetConfig = {
            apiBaseUrl: "http://localhost:3000/api",
            initialGreeting: "Hello! I am now running in mock mode for verification.",
            theme: "light",
            position: "bottom-right",
            useMock: true
        };
    </script>

    <!-- Widget Script -->
    <script src="public/embed/widget.global.js"></script>
    
    <p>Check the bottom right for the widget launcher.</p>
    
    <div style="margin-top: 20px;">
        <button onclick="CopilotWidget.unmount()">Unmount Widget</button>
        <button onclick="CopilotWidget.mount()">Mount Widget</button>
        <button onclick="CopilotWidget.reinit()">Re-init Widget</button>
    </div>
</body>
</html>
